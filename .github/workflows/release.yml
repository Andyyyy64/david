name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: astral-sh/setup-uv@v5

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend + Electron main
        working-directory: web
        run: npm run build && npm run electron:compile

      - name: Prepare extraResources — daemon source
        run: |
          mkdir -p web/extraResources/daemon-src
          cp -r daemon web/extraResources/daemon-src/daemon
          cp pyproject.toml uv.lock web/extraResources/daemon-src/
          # Bundle the YOLO model too
          [ -f yolov8n.pt ] && cp yolov8n.pt web/extraResources/daemon-src/ || true

      - name: Prepare extraResources — uv binary (mac)
        run: |
          cp "$(which uv)" web/extraResources/uv
          chmod +x web/extraResources/uv

      - name: Build Mac DMG (${{ matrix.arch }})
        working-directory: web
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: release/*.dmg

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: astral-sh/setup-uv@v5

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend + Electron main
        working-directory: web
        run: npm run build && npm run electron:compile

      - name: Prepare extraResources — daemon source
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path web\extraResources\daemon-src
          Copy-Item -Recurse daemon web\extraResources\daemon-src\daemon
          Copy-Item pyproject.toml, uv.lock web\extraResources\daemon-src\
          if (Test-Path yolov8n.pt) { Copy-Item yolov8n.pt web\extraResources\daemon-src\ }

      - name: Prepare extraResources — uv binary (windows)
        shell: pwsh
        run: |
          $uvPath = (Get-Command uv).Source
          Copy-Item $uvPath "web\extraResources\uv.exe"

      - name: Build Windows installer
        working-directory: web
        run: npx electron-builder --win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/*.exe

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: true
          generate_release_notes: true
          body: |
            ## homelife.ai ${{ github.ref_name }}

            Personal AI life monitor — camera, screen, audio capture with LLM analysis.

            ### Downloads
            | Platform | File |
            |---|---|
            | macOS Apple Silicon (M1/M2/M3) | `*-arm64.dmg` |
            | macOS Intel | `*.dmg` (without arm64 in name) |
            | Windows 10/11 x64 | `*.exe` |

            ### Setup
            1. **Download and install** the app for your platform
            2. **First launch**: the app automatically sets up the Python environment (~1 min)
            3. **Add your API key** via Settings (⚙ gear icon, bottom-left)
               - Get a free Gemini key at https://aistudio.google.com/

            ### macOS note
            App is unsigned — right-click the DMG → Open to bypass Gatekeeper.

            ### Windows note
            SmartScreen may warn — click "More info" → "Run anyway".
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
