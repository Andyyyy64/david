appId: ai.homelife.app
productName: homelife.ai

directories:
  buildResources: electron/build
  output: ../release
  app: .

files:
  - electron/dist/**
  - dist/**
  - server/**
  - node_modules/**
  - package.json

# Bundle Python daemon source and uv binary for standalone operation
extraResources:
  - from: extraResources/
    to: .

# Unpack native modules from ASAR so they can be loaded at runtime
asarUnpack:
  - "node_modules/better-sqlite3/**"

mac:
  category: public.app-category.productivity
  icon: electron/build/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]

win:
  icon: electron/build/icon.ico
  target:
    - target: nsis
      arch: [x64]

linux:
  icon: electron/build/icon.png
  target:
    - target: AppImage

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
